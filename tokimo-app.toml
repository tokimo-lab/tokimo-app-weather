# Tokimo app manifest（供主 server 读取，注册 / spawn / 资源代理 / launchpad 展示）
[app]
id          = "weather"
display     = "Weather"
version     = "0.1.0"
description = "Tokimo Weather app — real-time weather forecast with air quality."

[runtime]
lifecycle    = "resident"
binary       = "tokimo-app-weather"
ui_dist      = "ui/dist"

[ui]
entry        = "assets/index.js"
window_type  = "weather"
category     = "app"
icon         = "CloudSun"
color        = "#38bdf8"
width        = 420
height       = 740
